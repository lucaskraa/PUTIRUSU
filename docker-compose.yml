services:
  postgres:
    image: postgres:16-alpine
    container_name: putirusu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: putirusu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - putirusu_postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d putirusu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  putirusu_postgres_data:
